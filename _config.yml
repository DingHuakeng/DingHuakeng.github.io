# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Huakeng Ding | 丁华铿"
title_separator          : "-"
name                     : &name "Huakeng Ding"
description              : &description "M.S. Student @ ZJU CAD&CG State Key Lab. Focus on 3DGS, Differentiable Rendering, and Material Reconstruction."
url                      : "https://dinghuakeng.github.io"
baseurl                  : "" 
repository               : "dinghuakeng/dinghuakeng.github.io" # 请确认你的GitHub用户名是否为dinghuakeng

# Site Author - 这里的设置决定了网页左侧栏显示的内容
author:
  avatar           : "avatar.png" # 请确保根目录下有 profile.png 图片
  name             : "Huakeng Ding | 丁华铿"
  bio              : "M.S. Student @ ZJU CAD&CG"
  location         : "Hangzhou, China"
  employer         : "Zhejiang University"
  uri              : 
  email            : "dinghuakeng@qq.com" # 填入你的邮箱

# Publication Category
publication_category:
  conferences:
    title: 'Conference Papers'
  manuscripts:
    title: 'Journal Articles'    

# Site Settings
teaser                   : 
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# Inclusion/Exclusion - 保持默认，确保包含必要文件夹
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .github
  - Gemfile
  - LICENSE
  - node_modules
  - package.json
  - README
  - vendor

# Collections - 你只想要 Publication，所以我们只保留这个和必要的
collections:
  publications:
    output: true
    permalink: /:collection/:path/

# Defaults - 页面配置
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true

# Conversion & Processing
markdown: kramdown
highlighter: rouge
sass:
  sass_dir: _sass
  style: compressed
permalink: /:categories/:title/
timezone: Asia/Shanghai

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
